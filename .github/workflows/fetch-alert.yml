name: GLAD Alerts Pipeline

# Triggering rules for the workflow
on:
  schedule:
    - cron: "0 2 */5 * *"  # Run every 5 days at 02:00 UTC
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  run-glad-pipeline:
    runs-on: ubuntu-latest   # Use the latest Ubuntu runner

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3
        # This step pulls the repository code so the workflow can access scripts and files

      # 2️⃣ Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
        # Installs Python 3.11 on the runner

      # 3️⃣ Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        # Upgrades pip and installs all packages listed in requirements.txt
        # Ensures that geopandas, rasterio, psycopg2, numpy, etc., are available

      # 4️⃣ Run the GLAD alerts pipeline script
      - name: Run GLAD pipeline
        run: python gfw_alerts_pipeline.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # AOI path can be versioned in repo; not required as a secret
          AOI_GEOJSON_PATH: "mahagi.geojson"
        # Executes your Python script to download GLAD-L and Sentinel-2 tiles,
        # extract centroids within AOI, and insert into the database

      # 5️⃣ Optional: Send WhatsApp recap
      - name: Send WhatsApp recap
        run: python send_whatsapp_alerts.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          PHONE_NUMBER_ID: ${{ secrets.PHONE_NUMBER_ID }}
        # Executes a Python script to send WhatsApp notifications using Supabase credentials
        # All secrets are stored safely in GitHub Secrets
